{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pr Tech{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #050008; color: #fff; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0,0,0,0.3);
            position: static;
            top: 0;
            z-index: 100;
        }
        header h1 { color: #a855f7; font-size: 28px; font-weight: 700; }
        nav { display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: #bbb; transition: all 0.3s; }
        nav a:hover { color: #a855f7; }
        
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            padding: 12px 30px;
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(168, 85, 247, 0.3); }
        
        footer {
            background: #000;
            padding: 40px 60px;
            text-align: center;
            color: #666;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            margin-top: 80px;
        }
        
        @media (max-width: 768px) {
            header { padding: 15px 30px; flex-direction: column; gap: 20px; }
            nav { flex-direction: column; gap: 10px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<header>
    <h1>Smart Resume Analyzer</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
        <a href="/upload-resume/" class="btn-primary">Upload Resume</a>
    </nav>
</header>

{% block content %}{% endblock %}

<footer>
    &copy; 2026 Pr Tech. All rights reserved.
</footer>

</body>
</html>
